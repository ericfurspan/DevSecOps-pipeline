name: Secret Scanning — Gitleaks

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read
  security-events: write

jobs:
  gitleaks:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0  # Required for the event-specific commit range
          persist-credentials: false

      - name: Run Gitleaks
        # Runs with Gitleaks' built-in default rules (150+ patterns) — no config file present.
        # To allowlist a false positive or add a custom rule, add a .gitleaks.toml at the repo
        # root ([[rules]] / [allowlist] blocks) and pass it via GITLEAKS_CONFIG below.
        # Default rules: github.com/gitleaks/gitleaks/blob/master/config/gitleaks.toml
        id: gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_CONFIG: .gitleaks.toml

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3
        if: always()
        with:
          sarif_file: results.sarif
        continue-on-error: true  # SARIF file only exists when findings are present
