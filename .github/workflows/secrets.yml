name: Secret Scanning — Gitleaks

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read
  security-events: write

jobs:
  gitleaks:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history required for git-log scanning

      - name: Run Gitleaks
        # Runs with Gitleaks' built-in default rules (150+ patterns) — no config file present.
        # To allowlist a false positive or add a custom rule, add a .gitleaks.toml at the repo
        # root ([[rules]] / [allowlist] blocks) and pass it via GITLEAKS_CONFIG below.
        # Default rules: github.com/gitleaks/gitleaks/blob/master/config/gitleaks.toml
        id: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
          # GITLEAKS_CONFIG: .gitleaks.toml

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: results.sarif
        continue-on-error: true  # SARIF file only exists when findings are present
