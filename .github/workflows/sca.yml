name: SCA — Trivy

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  trivy:
    name: Trivy SCA + Container Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create reports directory
        run: mkdir -p reports

      - name: Build Docker image
        run: docker build -t devsecops-demo:${{ github.sha }} .

      - name: Scan filesystem (dependencies)
        # severity: add/remove MEDIUM,LOW etc. to change the gate.
        # To suppress a specific CVE, add a .trivyignore file at the repo root (one CVE ID per
        # line, e.g. CVE-2023-32681), or use a trivy.yaml config for more options:
        # aquasecurity.github.io/trivy/latest/docs/configuration/filtering/
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          scan-type: fs
          scan-ref: app/
          format: json
          output: reports/trivy-fs.json
          severity: HIGH,CRITICAL
          exit-code: "1"

      - name: Scan container image
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        if: always()
        with:
          image-ref: devsecops-demo:${{ github.sha }}
          format: json
          output: reports/trivy-image.json
          severity: HIGH,CRITICAL
          exit-code: "1"

      - name: Upload Trivy reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-reports
          path: reports/trivy-*.json
          retention-days: 30
