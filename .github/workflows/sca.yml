name: SCA — Trivy + OWASP Dependency-Check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  trivy:
    name: Trivy SCA + Container Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t devsecops-demo:${{ github.sha }} .

      - name: Scan filesystem (dependencies)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: app/
          format: json
          output: reports/trivy-fs.json
          severity: HIGH,CRITICAL
          exit-code: "1"

      - name: Scan container image
        uses: aquasecurity/trivy-action@master
        if: always()
        with:
          image-ref: devsecops-demo:${{ github.sha }}
          format: json
          output: reports/trivy-image.json
          severity: HIGH,CRITICAL
          exit-code: "1"

      - name: Upload findings to DefectDojo
        if: always()
        run: bash scripts/upload-to-defectdojo.sh trivy reports/trivy-fs.json
        env:
          DEFECTDOJO_URL: ${{ secrets.DEFECTDOJO_URL }}
          DEFECTDOJO_API_KEY: ${{ secrets.DEFECTDOJO_API_KEY }}
          DEFECTDOJO_ENGAGEMENT_ID: ${{ secrets.DEFECTDOJO_ENGAGEMENT_ID }}

  dependency-check:
    name: OWASP Dependency-Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: devsecops-demo
          path: app/
          format: ALL
          out: reports/
          args: >
            --failOnCVSS 7
            --enableRetired
            --nvdApiKey ${{ secrets.NVD_API_KEY }}

      - name: Upload HTML report as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-check-report
          path: reports/dependency-check-report.html
          retention-days: 30

      - name: Upload findings to DefectDojo
        if: always()
        run: bash scripts/upload-to-defectdojo.sh dependency-check reports/dependency-check-report.xml
        env:
          DEFECTDOJO_URL: ${{ secrets.DEFECTDOJO_URL }}
          DEFECTDOJO_API_KEY: ${{ secrets.DEFECTDOJO_API_KEY }}
          DEFECTDOJO_ENGAGEMENT_ID: ${{ secrets.DEFECTDOJO_ENGAGEMENT_ID }}
