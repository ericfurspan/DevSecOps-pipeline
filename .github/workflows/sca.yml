name: SCA — Trivy

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  trivy:
    name: Trivy SCA + Container Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Create reports directory
        run: mkdir -p reports

      - name: Build Docker image
        run: docker build -t devsecops-demo:${{ github.sha }} .

      - name: Scan filesystem (dependencies)
        # severity: add/remove MEDIUM,LOW etc. to change the gate.
        # To suppress a specific CVE, add a .trivyignore file at the repo root (one CVE ID per
        # line, e.g. CVE-2023-32681), or use a trivy.yaml config for more options:
        # aquasecurity.github.io/trivy/latest/docs/configuration/filtering/
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          scan-type: fs
          scan-ref: app/
          format: json
          output: reports/trivy-fs.json
          severity: HIGH,CRITICAL
          # Findings are expected in this deliberately vulnerable fixture.
          exit-code: "0"

      - name: Scan container image
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        if: always()
        with:
          image-ref: devsecops-demo:${{ github.sha }}
          format: json
          output: reports/trivy-image.json
          severity: HIGH,CRITICAL
          exit-code: "0"

      - name: Verify expected demo findings
        if: always()
        run: |
          set -euo pipefail
          for report in reports/trivy-fs.json reports/trivy-image.json; do
            test -s "$report"
            count="$(jq '[.Results[]?.Vulnerabilities[]? |
              select(.Severity == "HIGH" or .Severity == "CRITICAL")] | length' "$report")"
            if [[ "$count" -lt 1 ]]; then
              echo "Expected at least one HIGH or CRITICAL finding in $report" >&2
              exit 1
            fi
            echo "$report: $count expected HIGH/CRITICAL findings"
          done

      - name: Upload Trivy reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: trivy-reports
          path: reports/trivy-*.json
          retention-days: 30
