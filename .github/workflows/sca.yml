name: SCA — Trivy + OWASP Dependency-Check

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  trivy:
    name: Trivy SCA + Container Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create reports directory
        run: mkdir -p reports

      - name: Build Docker image
        run: docker build -t devsecops-demo:${{ github.sha }} .

      - name: Scan filesystem (dependencies)
        # severity: add/remove MEDIUM,LOW etc. to change the gate.
        # To suppress a specific CVE, add a .trivyignore file at the repo root (one CVE ID per
        # line, e.g. CVE-2023-32681), or use a trivy.yaml config for more options:
        # aquasecurity.github.io/trivy/latest/docs/configuration/filtering/
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: app/
          format: json
          output: reports/trivy-fs.json
          severity: HIGH,CRITICAL
          exit-code: "1"

      - name: Scan container image
        uses: aquasecurity/trivy-action@0.28.0
        if: always()
        with:
          image-ref: devsecops-demo:${{ github.sha }}
          format: json
          output: reports/trivy-image.json
          severity: HIGH,CRITICAL
          exit-code: "1"

  dependency-check:
    name: OWASP Dependency-Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create reports directory
        run: mkdir -p reports

      - name: Run OWASP Dependency-Check
        # --failOnCVSS: lower/raise the gate (e.g. 9 to only fail on critical).
        # To suppress a specific false positive, add a suppression.xml with a <suppress> block
        # matching the CVE/CPE, then append "--suppression suppression.xml" here.
        # Docs: jeremylong.github.io/DependencyCheck/general/suppression.html
        uses: dependency-check/Dependency-Check_Action@v3.1.0
        with:
          project: devsecops-demo
          path: app/
          format: ALL
          out: reports/
          args: >
            --failOnCVSS 7
            --enableRetired
            ${{ secrets.NVD_API_KEY != '' && format('--nvdApiKey {0}', secrets.NVD_API_KEY) || '' }}

      - name: Upload HTML report as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-check-report
          path: reports/dependency-check-report.html
          retention-days: 30
