name: DAST — OWASP ZAP

on:
  schedule:
    - cron: '0 2 * * 0'  # Weekly, Sunday 2am UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  zap:
    name: ZAP API Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Start target app
        run: docker compose up -d

      - name: Wait for health check
        run: |
          for i in $(seq 1 12); do
            curl -sf http://localhost:5001/health && break
            sleep 5
          done

      - name: Create reports directory
        run: mkdir -p reports

      - name: Run ZAP API scan
        # To change which alerts fail the build, pass a rules_file_name (TSV: "<rule-id>\t<threshold>"
        # per line, e.g. "10021\tIGNORE") or add inline overrides via cmd_options (e.g. "-config
        # rules.10021.threshold=ignore"). For a fuller crawl-based scan instead of just the API
        # definition, swap this action for zaproxy/action-full-scan.
        # Docs: zaproxy.org/docs/docker/api-scan/ · github.com/zaproxy/action-api-scan
        uses: zaproxy/action-api-scan@v0.7.0
        with:
          target: 'app/openapi.yaml'
          format: openapi
          cmd_options: "-J reports/zap-report.json -r reports/zap-report.html"

      - name: Upload HTML report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report
          path: reports/zap-report.html

      - name: Tear down app
        if: always()
        run: docker compose down
