name: DAST — OWASP ZAP

on:
  schedule:
    - cron: '0 2 * * 0'  # Weekly, Sunday 2am UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  zap:
    name: ZAP API Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Start target app
        run: docker compose up -d

      - name: Wait for health check
        run: |
          for i in $(seq 1 12); do
            curl -sf http://localhost:5001/health && break
            sleep 5
          done

      - name: Create reports directory
        run: mkdir -p reports

      - name: Run ZAP API scan
        uses: zaproxy/action-api-scan@v0.7.0
        with:
          target: 'app/openapi.yaml'
          format: openapi
          cmd_options: "-J reports/zap-report.json -r reports/zap-report.html"

      - name: Upload HTML report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report
          path: reports/zap-report.html

      - name: Tear down app
        if: always()
        run: docker compose down
